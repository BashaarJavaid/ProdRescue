apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: prodrescue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: ${ECR_REGISTRY}/prodrescue:${IMAGE_TAG}
          command: ["uvicorn", "services.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: prodrescue-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: prodrescue
spec:
  selector:
    app: api
  ports:
    - port: 80
      targetPort: 8000
